services:
  # Spring Boot Backend
  - type: web
    name: compliantbox-backend
    runtime: java
    rootDir: springboot-backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/compliantbox-backend-1.0.0.jar
    envVars:
      - key: JDBC_DATABASE_URL
        fromDatabase:
          name: compliantbox-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: compliantbox-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: compliantbox-db
          property: password
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 5000

  # React Frontend (Static Site)
  - type: web
    name: compliantbox-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: compliantbox-db
    plan: free
