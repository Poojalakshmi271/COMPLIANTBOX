# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Server — Render sets PORT automatically
server.port=${PORT:5000}

# PostgreSQL Database
# Render provides DATABASE_URL as postgres://user:pass@host/db
# Spring Boot needs jdbc:postgresql://... format
# We use JDBC_DATABASE_URL (Render sets this automatically for Java apps)
# with fallback to building it from individual vars.
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:compliantbox}}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT — value comes from Render Environment Variable
jwt.secret=${JWT_SECRET:ThisIsADefaultSecretKeyForDevOnlyPleaseChangeInProduction}
jwt.expiration=2592000000

# CORS is handled in SecurityConfig
